name: software-release-pipeline
version: 1.0.0
description: |
  Automotive software release pipeline from development to production deployment.
  Covers branching, building, testing, code signing, packaging, and deployment
  following ISO 26262, ISO 21434, and ASPICE process requirements.

domain: devops
safety_standard: ISO_26262_ISO_21434
estimated_duration: 1-2_weeks

phases:
  - phase: release_preparation
    name: Release Branch Creation and Freeze
    description: Create release branch and freeze feature development
    duration: 1_day
    inputs:
      - development_branch (main/develop)
      - release_version_number
      - feature_completion_status
      - release_notes_draft
    outputs:
      - release_branch
      - frozen_baseline
      - release_planning_document
    tools:
      - Git (version control)
      - JIRA (issue tracking)
      - Confluence (documentation)
    skills_used:
      - version-control
      - release-management
    agents_involved:
      - release-manager
      - devops-engineer
    tasks:
      - Create release branch (release/vX.Y.Z)
      - Tag baseline commit
      - Update version numbers in code
      - Generate changelog from commit history
      - Notify team of code freeze
    acceptance_criteria:
      - Release branch created
      - All planned features merged
      - Code freeze communicated
    safety_considerations:
      - Safety-critical changes reviewed and approved

  - phase: build_and_test
    name: Automated Build and Comprehensive Testing
    description: Build all software variants and execute full test suite
    duration: 2-3_days
    inputs:
      - release_branch
      - build_configurations (Debug, Release, variants)
      - test_suite (unit, integration, HIL)
    outputs:
      - compiled_binaries (all variants)
      - test_results
      - code_coverage_report
      - static_analysis_report
    tools:
      - Jenkins/GitLab CI (build automation)
      - Docker (build environment)
      - CMake/Make (build system)
      - GoogleTest (unit testing)
      - cppcheck (static analysis)
      - gcov/lcov (coverage)
    skills_used:
      - ci-cd
      - automated-testing
      - build-engineering
    agents_involved:
      - devops-engineer
      - test-automation-engineer
    tasks:
      - Build all software variants (ECU types, vehicle platforms)
      - Run unit tests with coverage analysis
      - Execute integration tests on HIL
      - Perform static code analysis
      - Generate MISRA compliance report
      - Archive build artifacts
    acceptance_criteria:
      - All builds successful (zero errors)
      - Test pass rate 100%
      - Code coverage >95%
      - MISRA compliance >98%
    safety_considerations:
      - Safety tests executed with 100% pass rate

  - phase: security_hardening
    name: Security Scanning and Code Signing
    description: Scan for vulnerabilities and sign binaries per ISO 21434
    duration: 1-2_days
    inputs:
      - compiled_binaries
      - dependency_list
      - signing_keys (HSM-stored)
    outputs:
      - vulnerability_scan_report
      - signed_binaries
      - sbom (Software Bill of Materials)
    tools:
      - Snyk/Trivy (dependency scanning)
      - SonarQube (SAST)
      - OpenSSL/HSM (code signing)
      - SBOM tools (SPDX, CycloneDX)
    skills_used:
      - cybersecurity
      - code-signing
      - vulnerability-management
    agents_involved:
      - security-engineer
      - devops-engineer
    tasks:
      - Scan dependencies for CVEs
      - Run SAST (static application security testing)
      - Sign binaries with HSM-stored private key
      - Generate SBOM for supply chain transparency
      - Verify signatures
    acceptance_criteria:
      - Zero critical vulnerabilities
      - All binaries signed and verified
      - SBOM generated
    safety_considerations:
      - Secure boot chain validated

  - phase: packaging
    name: Release Package Creation
    description: Package software with documentation and deployment scripts
    duration: 1_day
    inputs:
      - signed_binaries
      - release_notes
      - calibration_files
      - deployment_scripts
    outputs:
      - release_package (zip/tar)
      - installation_guide
      - rollback_procedure
    tools:
      - Artifactory/Nexus (artifact repository)
      - Docker (container images)
      - Git tags
    skills_used:
      - packaging
      - documentation
    agents_involved:
      - release-manager
      - technical-writer
    tasks:
      - Create release package with all artifacts
      - Include installation and rollback scripts
      - Generate checksums (SHA256)
      - Upload to artifact repository
      - Tag git release (vX.Y.Z)
    acceptance_criteria:
      - Package contains all required files
      - Checksums verified
      - Package uploaded to repository
    safety_considerations:
      - Rollback package prepared

  - phase: deployment
    name: Staged Deployment and Validation
    description: Deploy to test fleet, then production in stages
    duration: 3-5_days
    inputs:
      - release_package
      - deployment_plan
      - test_fleet_inventory
    outputs:
      - deployment_report
      - post_deployment_validation
      - production_release_approval
    tools:
      - Vector vFlash (ECU programming)
      - OTA platform (AWS IoT, Azure IoT Hub)
      - Monitoring dashboards
    skills_used:
      - deployment-automation
      - fleet-management
    agents_involved:
      - devops-engineer
      - validation-engineer
    deployment_stages:
      - Stage 1: Lab HIL benches (1 day)
      - Stage 2: Test fleet 10 vehicles (2 days)
      - Stage 3: Production fleet phased rollout (weeks)
    tasks:
      - Flash test vehicles via OBD-II/Ethernet
      - Monitor for DTCs and anomalies
      - Validate functionality on test fleet
      - Approve production deployment
      - Deploy to production fleet in batches (canary, gradual)
    acceptance_criteria:
      - Test fleet validation passed
      - Zero critical issues in test fleet
      - Production deployment approved
    safety_considerations:
      - Rollback plan ready
      - Safety monitoring active

  - phase: post_release
    name: Post-Release Monitoring and Support
    description: Monitor fleet for issues and provide hotfix support
    duration: ongoing
    inputs:
      - deployed_software_version
      - fleet_telemetry
      - customer_feedback
    outputs:
      - fleet_health_dashboard
      - issue_tracker
      - hotfix_candidates
    tools:
      - Grafana/Kibana (monitoring)
      - JIRA (issue tracking)
      - PagerDuty (alerting)
    skills_used:
      - monitoring
      - incident-management
    agents_involved:
      - devops-engineer
      - support-engineer
    tasks:
      - Monitor fleet telemetry for anomalies
      - Track customer-reported issues
      - Triage defects (hotfix vs next release)
      - Prepare hotfix releases if critical
    acceptance_criteria:
      - Monitoring dashboards operational
      - Issue triage process active
    safety_considerations:
      - Critical safety issues trigger immediate recall

quality_gates:
  - gate: build_quality
    phase: build_and_test
    criteria:
      - All builds pass
      - Tests pass 100%
      - Coverage >95%
  - gate: security_clearance
    phase: security_hardening
    criteria:
      - Zero critical CVEs
      - Binaries signed
  - gate: deployment_approval
    phase: deployment
    criteria:
      - Test fleet validation passed
      - Management approval

metrics:
  - Build success rate
  - Test pass rate
  - Deployment success rate
  - Mean time to deploy (MTTD)
  - Rollback frequency
  - Customer-reported defects

references:
  - ISO 26262-8 (Software release)
  - ISO 21434 (Secure software updates)
  - ASPICE SUP.10 (Change management)
