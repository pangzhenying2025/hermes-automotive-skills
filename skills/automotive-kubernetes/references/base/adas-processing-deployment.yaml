---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adas-processing-service
  namespace: automotive-production
  labels:
    app.kubernetes.io/name: adas-processing-service
    app.kubernetes.io/component: adas
    app.kubernetes.io/part-of: automotive-platform
    automotive.io/safety-level: asil-b
    automotive.io/aspice-level: al2
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: adas-processing-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adas-processing-service
        app.kubernetes.io/version: "2.5.0"
        automotive.io/component: adas
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: adas-processing-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                  - adas-processing-service
              topologyKey: kubernetes.io/hostname

      containers:
      - name: adas-processor
        image: automotive/adas-processing-service:2.5.0
        imagePullPolicy: IfNotPresent

        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          readOnlyRootFilesystem: true

        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        - name: grpc
          containerPort: 50051
          protocol: TCP

        env:
        - name: LOG_LEVEL
          value: "info"
        - name: ENVIRONMENT
          value: "production"
        - name: METRICS_PORT
          value: "9090"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi

        livenessProbe:
          httpGet:
            path: /health/live
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: config
          mountPath: /etc/adas
          readOnly: true

      volumes:
      - name: tmp
        emptyDir: {}
      - name: config
        configMap:
          name: adas-processing-config

---
apiVersion: v1
kind: Service
metadata:
  name: adas-processing-service
  namespace: automotive-production
  labels:
    app.kubernetes.io/name: adas-processing-service
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  - port: 9090
    targetPort: metrics
    protocol: TCP
    name: metrics
  - port: 50051
    targetPort: grpc
    protocol: TCP
    name: grpc
  selector:
    app.kubernetes.io/name: adas-processing-service

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: adas-processing-service
  namespace: automotive-production
  labels:
    app.kubernetes.io/name: adas-processing-service

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: adas-processing-config
  namespace: automotive-production
data:
  config.yaml: |
    processing:
      threads: 4
      queue_size: 1000
      timeout_ms: 100

    sensors:
      camera_fps: 30
      radar_rate_hz: 20
      lidar_rate_hz: 10

    safety:
      watchdog_timeout_ms: 500
      emergency_stop_enabled: true
      asil_level: "B"

    logging:
      level: info
      format: json
      output: stdout

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: adas-processing-service
  namespace: automotive-production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: adas-processing-service
  minReplicas: 3
  maxReplicas: 20
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 30
      selectPolicy: Max

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: adas-processing-service
  namespace: automotive-production
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: adas-processing-service

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: adas-processing-service
  namespace: automotive-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: adas-processing-service
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          environment: production
    - podSelector:
        matchLabels:
          automotive.io/access-adas: "true"
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 50051
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          environment: production
    ports:
    - protocol: TCP
      port: 8080
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: adas-processing-service
  namespace: automotive-production
  labels:
    app.kubernetes.io/name: adas-processing-service
    monitoring: automotive
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: adas-processing-service
  endpoints:
  - port: metrics
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
