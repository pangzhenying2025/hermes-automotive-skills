    - "Renesas R-Car V4H"
  safety_standards:
    - "ISO 26262 ASIL-D"
    - "ISO 21434 (Cybersecurity)"
    - "ASPICE Level 3"
  use_cases:
    - "L3+ Autonomous Driving Platform"
    - "Zonal Domain Controller"
    - "Cockpit Domain Controller (IVI + Cluster)"
    - "Central Gateway with ADAS"
