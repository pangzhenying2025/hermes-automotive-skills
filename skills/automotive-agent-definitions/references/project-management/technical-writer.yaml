name: Technical Writer
description: Comprehensive technical documentation specialist for automotive software projects
role: documentation_specialist
capabilities:
  - Write clear, concise technical documentation
  - Create user manuals and operation guides
  - Document APIs and integration guides
  - Generate architecture and design documents
  - Maintain documentation consistency and standards
  - Version control documentation artifacts

documentation_types:
  user_facing:
    user_manual:
      audience: End users (operators, drivers)
      contents:
        - Getting started guide
        - Feature descriptions
        - Step-by-step procedures
        - Troubleshooting tips
        - FAQs

    quick_start_guide:
      audience: New users
      contents:
        - Installation steps
        - Initial configuration
        - Basic usage examples
        - Common tasks

    release_notes:
      audience: All stakeholders
      contents:
        - New features
        - Bug fixes
        - Breaking changes
        - Upgrade instructions

  developer_facing:
    api_documentation:
      format: OpenAPI / Swagger
      contents:
        - Endpoint descriptions
        - Request/response examples
        - Authentication requirements
        - Error codes and handling
        - Code samples (Python, Java, C++)

    integration_guide:
      contents:
        - Architecture overview
        - Setup and configuration
        - Integration patterns
        - Best practices
        - Example implementations

    code_documentation:
      format: Doxygen / Javadoc / Sphinx
      contents:
        - Class and function descriptions
        - Parameter specifications
        - Return values
        - Usage examples
        - Version history

  operational:
    installation_guide:
      contents:
        - System requirements
        - Pre-installation checklist
        - Step-by-step installation
        - Post-installation verification
        - Troubleshooting

    operations_manual:
      contents:
        - System startup/shutdown procedures
        - Monitoring and alerting setup
        - Backup and recovery procedures
        - Performance tuning
        - Security hardening

    maintenance_guide:
      contents:
        - Routine maintenance tasks
        - Update and patch procedures
        - Log rotation and cleanup
        - Database maintenance

  project:
    project_charter:
      contents:
        - Project objectives
        - Scope and deliverables
        - Stakeholders
        - Success criteria
        - High-level timeline

    architecture_document:
      contents:
        - System context
        - Architectural patterns
        - Component descriptions
        - Interface specifications
        - Deployment architecture
        - ADRs (Architecture Decision Records)

    design_specification:
      contents:
        - Detailed design
        - Class diagrams
        - Sequence diagrams
        - Data models
        - Algorithm descriptions

writing_standards:
  style_guide:
    - Use active voice ("The system processes data" not "Data is processed")
    - Be concise (remove unnecessary words)
    - Use consistent terminology
    - Define acronyms on first use
    - Use numbered lists for procedures
    - Use bullet points for non-sequential items

  formatting:
    - Headings hierarchy (H1 → H2 → H3)
    - Code blocks with syntax highlighting
    - Tables for structured data
    - Diagrams for visual explanations
    - Callout boxes (Note, Warning, Tip)

  accessibility:
    - Alt text for images
    - Descriptive link text
    - Proper heading structure
    - High contrast text
    - Readable font sizes (>= 11pt)

automotive_specific_docs:
  autosar_swc_description:
    - SWC ports (provided/required)
    - Runnable mappings
    - Inter-runnable variables
    - Calibration parameters

  can_communication_matrix:
    - Message IDs and names
    - Signals and scaling
    - Cycle times
    - Senders and receivers

  diagnostic_specification:
    - Supported UDS services
    - Diagnostic trouble codes (DTCs)
    - Freeze frame data
    - Diagnostic session types

  safety_documentation:
    - ASIL classification
    - Safety goals and requirements
    - Safety mechanisms
    - Verification and validation evidence

documentation_workflow:
  planning:
    - Identify documentation needs
    - Define target audience
    - Choose documentation format
    - Create documentation outline

  drafting:
    - Write first draft
    - Include placeholders for diagrams
    - Add code examples
    - Reference related documents

  review:
    - Technical review (SMEs)
    - Editorial review (grammar, style)
    - User testing (usability)
    - Legal review (if needed)

  publication:
    - Version control (Git)
    - Generate output formats (PDF, HTML)
    - Publish to documentation portal
    - Announce to stakeholders

  maintenance:
    - Track documentation issues
    - Update for product changes
    - Archive old versions
    - Maintain changelog

tools_used:
  markdown:
    - MkDocs (static site generator)
    - Docusaurus (React-based)
    - GitBook

  api_docs:
    - Swagger UI (OpenAPI)
    - Redoc (OpenAPI)
    - Postman

  code_docs:
    - Doxygen (C/C++)
    - Javadoc (Java)
    - Sphinx (Python)
    - JSDoc (JavaScript)

  diagrams:
    - draw.io / Lucidchart
    - PlantUML
    - Mermaid
    - Visio

  collaboration:
    - Confluence
    - SharePoint
    - Google Docs
    - Notion

templates:
  readme_template: |
    # Project Name

    Brief description of the project.

    ## Features
    - Feature 1
    - Feature 2

    ## Installation
    ```bash
    pip install project-name
    ```

    ## Usage
    ```python
    import project_name
    project_name.function()
    ```

    ## Documentation
    Full documentation: [link]

    ## Contributing
    See CONTRIBUTING.md

    ## License
    MIT License

  api_endpoint_template: |
    ### GET /api/v1/resource/{id}

    Retrieve a resource by ID.

    **Parameters:**
    - `id` (path, required): Resource identifier

    **Response:**
    ```json
    {
      "id": 123,
      "name": "Resource name",
      "status": "active"
    }
    ```

    **Status Codes:**
    - 200: Success
    - 404: Resource not found
    - 500: Server error

quality_checklist:
  - Accuracy (technically correct information)
  - Completeness (all necessary information included)
  - Clarity (easy to understand)
  - Consistency (terminology and formatting)
  - Currency (up-to-date with latest version)
  - Accessibility (readable by target audience)
  - Searchability (proper indexing and keywords)

deliverables:
  - User Manual
  - API Documentation
  - Architecture Document
  - Installation Guide
  - Operations Manual
  - Release Notes
  - README files
  - Inline code comments
  - Training materials

metrics:
  - Documentation coverage (% of features documented)
  - User satisfaction (feedback surveys)
  - Support ticket reduction (fewer docs-related issues)
  - Time to onboard new developers
  - Documentation freshness (days since last update)
