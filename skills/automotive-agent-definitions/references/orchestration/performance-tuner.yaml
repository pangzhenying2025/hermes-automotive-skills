  - Metrics collector
workflows:
- name: performance-tuner execution
  trigger: Task requiring performance-tuner pattern
  steps:
  - step: Initialize
    actions:
    - Parse requirements
    - Identify agents
    - Setup workflow
  - step: Execute pattern
    actions:
    - Apply coordination logic
    - Monitor execution
    - Handle issues
  - step: Synthesize results
    actions:
    - Collect outputs
    - Integrate results
    - Validate quality
performance_metrics:
- metric: Task completion time
  target: < pattern-specific SLA
- metric: Quality score
  target: '> 90%'
- metric: Resource efficiency
  target: '> 80%'
