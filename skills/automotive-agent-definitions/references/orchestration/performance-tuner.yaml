  - "Profile system performance bottlenecks"
  - "Tune real-time task scheduling parameters"
  - "Benchmark and compare optimization strategies"
  - "Monitor performance metrics against targets"
expertise:
- Multi-agent coordination
- Workflow optimization
- Automotive processes
- Standards compliance
