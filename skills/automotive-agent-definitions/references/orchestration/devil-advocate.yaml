  - step: Execute pattern
    actions:
    - Apply coordination logic
    - Monitor execution
    - Handle issues
  - step: Synthesize results
    actions:
    - Collect outputs
    - Integrate results
    - Validate quality
performance_metrics:
- metric: Task completion time
